sonar.projectKey=YOUR_PROJECT_KEY
sonar.organization=YOUR_SONAR_ORG

# TODO (Module 5): Replace YOUR_PROJECT_KEY and YOUR_SONAR_ORG
# with values from your SonarCloud account after connecting your repo.
# Get these from: https://sonarcloud.io → your project → Information tab

sonar.sources=playwright-python,playwright-typescript
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/playwright-report/**

sonar.python.version=3.11

sonar.tests=playwright-python/tests,playwright-typescript/tests
sonar.test.inclusions=**/test_*.py,**/*.spec.ts

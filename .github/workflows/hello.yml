  # ── Playwright TypeScript ──────────────────────────────────────────────────
  test-typescript:
    name: Run Tests (TypeScript)
    runs-on: ubuntu-latest
    needs: [security-scan, code-quality]  # Quality gates must pass first

    defaults:
      run:
        working-directory: playwright-typescript

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'


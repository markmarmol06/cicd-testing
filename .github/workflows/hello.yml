      # Then install browsers: npx playwright install --with-deps chromium
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium 

      # TODO (Module 4): Run Playwright tests using npx playwright test
      - name: Run Playwright tests
        run:  npx playwright test
        env:
          CI: true
      # Set these env vars: BASE_URL, SAUCE_USERNAME, SAUCE_PASSWORD
      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.saucedemo.com' }}
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME || 'standard_user' }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD || 'secret_sauce' }}
   
